name: Split Monorepo

on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { local: suite,           split: laravel-erp-suite }
          - { local: core,            split: laravel-erp-core }
          - { local: accounting,      split: laravel-erp-accounting }
          - { local: stock,           split: laravel-erp-stock }
          - { local: selling,         split: laravel-erp-selling }
          - { local: buying,          split: laravel-erp-buying }
          - { local: manufacturing,   split: laravel-erp-manufacturing }
          - { local: assets,          split: laravel-erp-assets }
          - { local: subcontracting,  split: laravel-erp-subcontracting }
          - { local: crm,             split: laravel-erp-crm }
          - { local: projects,        split: laravel-erp-projects }
          - { local: support,         split: laravel-erp-support }
          - { local: quality,         split: laravel-erp-quality }
          - { local: maintenance,     split: laravel-erp-maintenance }

    name: Split ${{ matrix.package.split }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Push the current branch subtree to the read-only mirror.
      - name: Split (branch)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: symplify/monorepo-split-github-action@v2.3.0
        with:
          package_directory: 'packages/${{ matrix.package.local }}'
          repository_organization: jeffersongoncalves
          repository_name: ${{ matrix.package.split }}
          branch: ${{ github.ref_name }}
          user_name: jeffersongoncalves
          user_email: gerson.simao.92@gmail.com
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}

      # Propagate a newly created tag to the read-only mirror.
      - name: Split (tag)
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: symplify/monorepo-split-github-action@v2.3.0
        with:
          tag: ${{ github.ref_name }}
          package_directory: 'packages/${{ matrix.package.local }}'
          repository_organization: jeffersongoncalves
          repository_name: ${{ matrix.package.split }}
          user_name: jeffersongoncalves
          user_email: gerson.simao.92@gmail.com
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}
